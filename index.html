<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방심위 상정 안건 및 업무 캘린더</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .version { font-size: 14px; color: #7f8c8d; font-weight: normal; }
        .panel-group { display: flex; gap: 20px; margin-bottom: 20px; }
        .panel { flex: 1; padding: 15px; background: #f8f9fa; border-radius: 8px; border: 1px solid #ddd; }
        .panel h3 { margin-top: 0; font-size: 16px; color: #333; }
        .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        input[type="date"], input[type="text"], select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-header button { padding: 5px 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background-color: #ddd; border: 1px solid #ddd; }
        .calendar-day-header { background-color: #eee; padding: 10px; text-align: center; font-weight: bold; }
        .calendar-cell { background-color: #fff; min-height: 100px; padding: 5px; box-sizing: border-box; }
        .calendar-cell.empty { background-color: #f9f9f9; }
        .date-number { font-weight: bold; margin-bottom: 5px; color: #555; }
        
        /* Event Badges CSS */
        .event { font-size: 11px; padding: 5px; margin-bottom: 4px; border-radius: 4px; color: white; word-break: break-all; line-height: 1.3; cursor: pointer; transition: all 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .event:hover { opacity: 0.8; transform: translateY(-1px); }
        
        /* 업무별 색상 지정 */
        .ev-meeting { background-color: #9b59b6; } /* 상정: 보라색 */
        .ev-review { background-color: #f39c12; }  /* 회의록: 주황색 */
        .ev-draft { background-color: #3498db; }   /* 작성: 파란색 */
        .ev-approve { background-color: #e74c3c; } /* 결재: 빨간색 */
        .ev-send { background-color: #27ae60; }    /* 방송사 발송: 초록색 */
        .ev-reply { background-color: #16a085; }   /* 민원답변: 청록색 */
        
        /* 업무 완료(회색 배경, 취소선) 스타일 */
        .ev-completed { background-color: #95a5a6 !important; text-decoration: line-through; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <h1>
        <div>📅 방심위 상정 안건 캘린더 <span class="version">(V11 최종 안정화)</span></div>
        <button onclick="resetData()" style="font-size: 13px; padding: 6px 12px; background-color: #e74c3c; border-radius: 4px; color: white; border: none; cursor: pointer;">🚨 데이터 초기화</button>
    </h1>
    
    <div class="panel-group">
        <div class="panel">
            <h3>1. 신규 안건 상정 (회의 예정)</h3>
            <div class="form-group">
                <input type="date" id="agendaDate">
                <input type="text" id="agendaName" placeholder="안건명 (예: MBC 100분토론)">
                <button onclick="addAgenda()">안건 등록</button>
            </div>
        </div>

        <div class="panel">
            <h3>2. 회의 결과 업데이트 (수정 가능)</h3>
            <div class="form-group">
                <select id="pendingAgendas">
                    <option value="">안건 선택 (결과 수정 가능)</option>
                </select>
                <select id="agendaResult">
                    <option value="">의결 결과 선택</option>
                    <option value="대기중">🔄 결과 초기화 (대기 상태로)</option>
                    <option value="문제없음">문제없음 (종결)</option>
                    <option value="의견제시">의견제시 (행정지도)</option>
                    <option value="권고">권고 (행정지도)</option>
                    <option value="주의">주의 (법정제재)</option>
                    <option value="경고">경고 (법정제재)</option>
                    <option value="관계자징계">관계자징계 (법정제재)</option>
                    <option value="과징금">과징금 (법정제재)</option>
                </select>
                <button onclick="updateResult()">결과 반영하기</button>
            </div>
        </div>
    </div>

    <div class="calendar-header">
        <button onclick="changeMonth(-1)">◀ 이전 달</button>
        <h2 id="currentMonthLabel" style="margin:0;"></h2>
        <button onclick="changeMonth(1)">다음 달 ▶</button>
    </div>
    
    <div style="text-align: right; font-size: 12px; color: #7f8c8d; margin-bottom: 5px;">
        ※ 달력의 일정을 <b>클릭</b>하시면 <b>'완료(회색)'</b> 처리되며 데이터가 <b>자동 보존</b>됩니다.
    </div>

    <div class="calendar-grid" id="calendarGrid">
        </div>
</div>

<script>
    var agendas = []; 
    var completedEvents = []; 
    var currentYear = new Date().getFullYear();
    var currentMonth = new Date().getMonth();

    // 🌟 에러 완벽 차단을 위한 강력한 데이터 로드 검증
    function loadData() {
        try {
            var savedAgendas = localStorage.getItem('kcsc_agendas');
            var savedCompleted = localStorage.getItem('kcsc_completedEvents');
            
            if (savedAgendas) { 
                var parsed = JSON.parse(savedAgendas);
                // 데이터가 null이거나 배열이 아니면 빈 배열로 초기화 (에러 원천 차단)
                agendas = Array.isArray(parsed) ? parsed : [];
            } else {
                agendas = [];
            }
            
            if (savedCompleted) { 
                var parsedComp = JSON.parse(savedCompleted);
                completedEvents = Array.isArray(parsedComp) ? parsedComp : [];
            } else {
                completedEvents = [];
            }
        } catch (e) {
            console.error("데이터 로드 오류:", e);
            agendas = [];
            completedEvents = [];
        }
    }
