<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방심위 상정 안건 및 업무 캘린더</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .version { font-size: 14px; color: #7f8c8d; font-weight: normal; }
        
        .layout-wrapper { display: flex; gap: 20px; align-items: flex-start; }
        .main-content { flex: 3; min-width: 0; } 
        .side-memo { flex: 1; background: #fdf8e4; border-radius: 8px; border: 1px solid #f1e2a0; padding: 15px; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); position: sticky; top: 20px; height: 700px; display: flex; flex-direction: column; }
        
        .side-memo h3 { margin-top: 0; font-size: 16px; color: #d35400; border-bottom: 2px dashed #e67e22; padding-bottom: 10px; margin-bottom: 15px; }
        .side-memo textarea { flex: 1; width: 100%; border: none; background: transparent; resize: none; outline: none; line-height: 1.6; font-size: 14px; color: #333; font-family: 'Malgun Gothic', sans-serif; box-sizing: border-box; }
        
        .panel-group { display: flex; gap: 15px; margin-bottom: 20px; }
        .panel { flex: 1; padding: 15px; background: #f8f9fa; border-radius: 8px; border: 1px solid #ddd; }
        .panel h3 { margin-top: 0; font-size: 15px; color: #333; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 5px; }
        input[type="date"], input[type="text"], select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        button { padding: 9px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }
        button:hover { background-color: #2980b9; }
        
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-header button { padding: 5px 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background-color: #ddd; border: 1px solid #ddd; }
        .calendar-day-header { background-color: #eee; padding: 10px; text-align: center; font-weight: bold; font-size: 14px; }
        .calendar-cell { background-color: #fff; min-height: 100px; padding: 5px; box-sizing: border-box; }
        .calendar-cell.empty { background-color: #f9f9f9; }
        
        /* 휴가용 CSS 클래스 */
        .calendar-cell.vacation-bg { background-color: #e8e8e8 !important; } 
        .date-header-wrapper { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
        .date-number { font-weight: bold; color: #555; }
        .vacation-label { color: #e74c3c; font-size: 11px; font-weight: bold; cursor: pointer; background: rgba(255,255,255,0.7); padding: 2px 4px; border-radius: 3px; }
        .vacation-label:hover { text-decoration: underline; }

        /* Event Badges CSS */
        .event { font-size: 11px; padding: 5px; margin-bottom: 4px; border-radius: 4px; color: white; word-break: break-all; line-height: 1.3; cursor: pointer; transition: all 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .event:hover { opacity: 0.8; transform: translateY(-1px); }
        
        .ev-meeting { background-color: #9b59b6; } 
        .ev-review { background-color: #f39c12; }  
        .ev-draft { background-color: #3498db; }   
        .ev-approve { background-color: #e74c3c; } 
        .ev-send { background-color: #27ae60; }    
        .ev-reply { background-color: #16a085; }   
        
        .ev-completed { background-color: #95a5a6 !important; text-decoration: line-through; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <h1>
        <div>📅 방심위 상정 안건 캘린더 <span class="version">(V15 순정 기반 휴가 추가 버전)</span></div>
        <button onclick="resetData()" style="font-size: 13px; padding: 6px 12px; background-color: #c0392b; border-radius: 4px; color: white; border: none; cursor: pointer;">🚨 데이터 초기화</button>
    </h1>
    
    <div class="layout-wrapper">
        <div class="main-content">
            <div class="panel-group">
                <div class="panel">
                    <h3>1. 신규 안건 상정</h3>
                    <div class="form-group">
                        <input type="date" id="agendaDate">
                        <input type="text" id="agendaName" placeholder="안건명 (예: 100분토론)">
                        <button onclick="addAgenda()">안건 등록</button>
                    </div>
                </div>

                <div class="panel">
                    <h3>2. 결과 업데이트</h3>
                    <div class="form-group">
                        <select id="pendingAgendas">
                            <option value="">안건 선택 (결과 수정 가능)</option>
                        </select>
                        <select id="agendaResult">
                            <option value="">의결 결과 선택</option>
                            <option value="대기중">🔄 결과 초기화(대기)</option>
                            <option value="문제없음">문제없음</option>
                            <option value="의견제시">의견제시 (행정지도)</option>
                            <option value="권고">권고 (행정지도)</option>
                            <option value="주의">주의 (법정제재)</option>
                            <option value="경고">경고 (법정제재)</option>
                            <option value="관계자징계">관계자징계 (법정제재)</option>
                            <option value="과징금">과징금 (법정제재)</option>
                        </select>
                        <button onclick="updateResult()">결과 반영하기</button>
                    </div>
                </div>

                <div class="panel" style="background: #fdf2e9; border-color: #fad7a1;">
                    <h3>🌴 3. 내 휴가 등록</h3>
                    <div class="form-group">
                        <input type="date" id="vacationDate">
                        <select id="vacationType">
                            <option value="전일휴가">전일휴가</option>
                            <option value="전반차">전반차 (08:00~13:00)</option>
                            <option value="후반차">후반차 (12:00~17:00)</option>
                            <option value="전반반차">전반반차 (08:00~10:00)</option>
                            <option value="후반반차">후반반차 (15:00~17:00)</option>
                        </select>
                        <button onclick="addVacation()" style="background-color: #e67e22;">휴가 등록</button>
                    </div>
                </div>
            </div>

            <div class="calendar-header">
                <button onclick="changeMonth(-1)">◀ 이전 달</button>
                <h2 id="currentMonthLabel" style="margin:0;"></h2>
                <button onclick="changeMonth(1)">다음 달 ▶</button>
            </div>
            
            <div style="text-align: right; font-size: 12px; color: #7f8c8d; margin-bottom: 5px;">
                ※ 일정을 클릭하면 완료(회색) 처리됩니다. / 휴가 글자를 클릭하면 삭제됩니다.
            </div>

            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="side-memo">
            <h3>📝 상시 업무 메모</h3>
            <textarea id="dailyMemo" placeholder="여기에 상시 업무나 간단한 메모를 자유롭게 기록하세요.&#10;(글자를 입력하는 즉시 자동 저장됩니다)"></textarea>
        </div>
    </div>
</div>

<script>
    var agendas = []; 
    var completedEvents = []; 
    var vacations = []; 
    var currentYear = new Date().getFullYear();
    var currentMonth = new Date().getMonth();

    // V13의 순수 데이터 로드 방식으로 복원
    function loadData() {
        var savedAgendas = localStorage.getItem('kcsc_agendas');
        var savedCompleted = localStorage.getItem('kcsc_completedEvents');
        var savedMemo = localStorage.getItem('kcsc_memo'); 
        var savedVacations = localStorage.getItem('kcsc_vacations'); 
        
        if (savedAgendas) { agendas = JSON.parse(savedAgendas); }
        if (savedCompleted) { completedEvents = JSON.parse(savedCompleted); }
        if (savedMemo) { document.getElementById('dailyMemo').value = savedMemo; }
        if (savedVacations) { vacations = JSON.parse(savedVacations); }
    }

    function saveData() {
        localStorage.setItem('kcsc_agendas', JSON.stringify(agendas));
        localStorage.setItem('kcsc_completedEvents', JSON.stringify(completedEvents));
        localStorage.setItem('kcsc_vacations', JSON.stringify(vacations)); 
    }

    function resetData() {
        if(confirm("저장된 모든 달력 일정, 안건, 휴가, 메모 데이터를 완전히 삭제하시겠습니까?")) {
            localStorage.removeItem('kcsc_agendas');
            localStorage.removeItem('kcsc_completedEvents');
            localStorage.removeItem('kcsc_memo'); 
            localStorage.removeItem('kcsc_vacations');
            
            agendas = [];
            completedEvents = [];
            vacations = [];
            document.getElementById('dailyMemo').value = '';
            
            renderCalendar(currentYear, currentMonth);
            updatePendingList();
            alert("초기화가 완료되었습니다.");
        }
    }

    function init() {
        loadData();
        renderCalendar(currentYear, currentMonth);
        updatePendingList();
        
        document.getElementById('dailyMemo').addEventListener('input', function() {
            localStorage.setItem('kcsc_memo', this.value);
        });
    }

    // 휴가 등록 및 삭제 (V13의 방식과 호환되도록 단순화)
    function addVacation() {
        var rawDate = document.getElementById('vacationDate').value;
        var type = document.getElementById('vacationType').value;
        if (!rawDate) { alert('휴가 날짜를 선택해주세요.'); return; }

        var d = new Date(rawDate);
        if (isNaN(d.getTime())) { alert('유효하지 않은 날짜입니다.'); return; }

        var yStr = d.getFullYear();
        var mStr = (d.getMonth() + 1 < 10 ? '0' : '') + (d.getMonth() + 1);
        var dStr = (d.getDate() < 10 ? '0' : '') + d.getDate();
        var safeDate = yStr + '-' + mStr + '-' + dStr;

        var newVacations = [];
        for(var i=0; i<vacations.length; i++) {
            if(vacations[i] && vacations[i].date !== safeDate) {
                newVacations.push(vacations[i]);
            }
        }
